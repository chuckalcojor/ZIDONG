<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A3 Plataforma - Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[radial-gradient(circle_at_top,_rgba(37,99,235,.22),_transparent_35%),linear-gradient(180deg,#020617_0%,#030817_45%,#020617_100%)] text-slate-100" style="font-family: Inter, sans-serif;">
  <main class="grid min-h-screen place-items-center p-4">
    <div class="w-full max-w-md rounded-3xl border border-blue-800/60 bg-[#071026]/95 p-7 shadow-[0_18px_60px_rgba(8,47,115,.45)]">
      <div class="mb-6 flex items-center gap-3">
        <div class="grid h-12 w-12 place-items-center rounded-xl bg-blue-600 font-semibold" style="font-family: Sora, Inter, sans-serif;">A3</div>
        <div>
          <h1 class="text-lg font-semibold" style="font-family: Sora, Inter, sans-serif;">Control Center</h1>
          <p class="text-xs text-slate-400">Acceso privado de operaciones</p>
        </div>
      </div>

      <form method="post" action="{{ url_for('login') }}" class="space-y-4">
        <div>
          <label for="username" class="mb-1 block text-xs font-medium text-slate-300">Usuario</label>
          <input id="username" name="username" type="text" required autocomplete="username"
            class="w-full rounded-xl border border-blue-800/70 bg-[#0b1633] px-3 py-2.5 text-sm text-slate-100 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-500/30">
        </div>

        <div>
          <label for="password" class="mb-1 block text-xs font-medium text-slate-300">Contrasena</label>
          <input id="password" name="password" type="password" required autocomplete="current-password"
            class="w-full rounded-xl border border-blue-800/70 bg-[#0b1633] px-3 py-2.5 text-sm text-slate-100 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-500/30">
        </div>

        <button type="submit" class="w-full rounded-xl bg-gradient-to-r from-blue-600 to-blue-500 px-4 py-2.5 text-sm font-semibold text-white hover:brightness-110">
          Ingresar
        </button>

        {% if error %}
        <p class="rounded-lg border border-red-500/40 bg-red-500/15 px-3 py-2 text-xs text-red-200">{{ error }}</p>
        {% endif %}
      </form>
    </div>
  </main>
</body>
</html>
