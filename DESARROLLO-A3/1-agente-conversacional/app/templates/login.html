<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A3 Tablero - Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css', v='20260415-contract-v4') }}">
</head>
<body class="theme-dark auth-screen">
  <div class="scene-glow glow-left"></div>
  <div class="scene-glow glow-right"></div>

  <main class="auth-layout">
    <section class="auth-card">
      <div class="auth-brand">
        <div class="auth-brand-icon">A3</div>
        <div class="auth-brand-copy">
          <strong>Centro de Control</strong>
          <span>Acceso privado de operaciones</span>
        </div>
      </div>

      <h1 class="auth-title">Bienvenido</h1>
      <p class="auth-subtitle">Ingresa tus credenciales para acceder al tablero operativo.</p>

      <form method="post" action="{{ url_for('login') }}" class="auth-form">
        <div class="auth-field">
          <label for="username">Usuario</label>
          <input id="username" name="username" type="text" required autocomplete="username" class="auth-input">
        </div>

        <div class="auth-field">
          <label for="password">Contrasena</label>
          <input id="password" name="password" type="password" required autocomplete="current-password" class="auth-input">
        </div>

        <button type="submit" class="auth-submit">Ingresar</button>

        {% if error %}
        <p class="auth-error">{{ error }}</p>
        {% endif %}
      </form>
    </section>
  </main>
</body>
</html>
